api_version = "2026-01"
uid = "36711979-70b0-1867-6c45-93eb5a79e69dec7a526c"

[[extensions]]
name = "Order cancellation"
handle = "account-cancel"
type = "ui_extension"

  # "Cancel order" button in each order's action menu — appears on both the
  # order index (list) page and the order status page.
  [[extensions.targeting]]
  target = "customer-account.order.action.menu-item.render"
  module = "./src/OrderActionMenuItem.jsx"

  # Confirmation modal opened when the button is clicked.
  [[extensions.targeting]]
  target = "customer-account.order.action.render"
  module = "./src/OrderActionModal.jsx"
